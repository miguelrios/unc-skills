# Optional non-secret overrides. By default Tether reuses Hermes's
# SLACK_HOME_CHANNEL and SLACK_ALLOWED_USERS settings.
default_channel = ""
# Empty means every explicitly allowlisted Hermes operator may reply.
default_owner = ""
team_id = ""
allowed_users = []

native_timeout_seconds = 1800
# Slack is a coordination surface, not a run log. Tether rejects longer
# bound-session replies so agents must rewrite instead of flooding a thread.
max_reply_words = 50
max_reply_chars = 500
max_reply_sentences = 3
codex_binary = "codex"
claude_binary = "claude"
codex_resume_args = []
claude_resume_args = []
# Zellij-only bridges are created only when the pane currently runs one of
# these commands, and delivery rechecks the exact process fingerprint.
zellij_agent_commands = ["claude", "codex", "gemini", "hermes", "pi"]

# Optional command that reads bridge metadata JSON from stdin and returns a
# JSON object containing short-lived environment values on stdout.
credential_command = []
credential_env_allowlist = []
