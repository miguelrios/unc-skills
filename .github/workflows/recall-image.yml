name: recall-image

permissions:
  contents: read
  packages: write

on:
  push:
    branches: ["main"]
    paths:
      - "recall/Dockerfile"
      - "recall/.dockerignore"
      - "recall/server/**"
      - "recall/contracts/**"
      - "recall/connectors/**"
      - "recall/privacy/**"
      - "recall/skills/recall/scripts/recall.py"
      - ".github/workflows/recall-image.yml"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: recall
          file: recall/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/recall-core:${{ github.sha }}
          provenance: mode=max
          sbom: true
