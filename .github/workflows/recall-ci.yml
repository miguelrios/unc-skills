name: recall-ci

permissions:
  contents: read

on:
  push:
    branches: ["main"]
    paths: ["recall/**", ".github/workflows/recall-ci.yml"]
  pull_request:
    branches: ["main"]
    paths: ["recall/**", ".github/workflows/recall-ci.yml"]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg16
        env:
          POSTGRES_PASSWORD: synthetic-ci-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: recall
    env:
      RECALL_DATABASE_URL: postgresql://postgres:synthetic-ci-password@127.0.0.1:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: python -m pip install -r server/requirements.txt bandit pip-audit ruff
      - run: npm test
      - run: ruff check . --select E9,F,PLE
      - run: bandit -q -lll -r . -x tests,server/tests
      - run: pip-audit -r server/requirements.txt
      - name: Fresh-PostgreSQL end-to-end suite
        run: |
          for test in \
            e2e_brainstore.py \
            e2e_session_source_l1.py \
            e2e_semantic_l2.py \
            e2e_capture_mcp.py \
            e2e_codex_projection.py \
            e2e_connector_host.py \
            e2e_connector_registry.py \
            e2e_connector_sdk.py \
            e2e_connector_supervisor.py \
            e2e_export_inbox.py \
            e2e_federation_ranking.py \
            e2e_grep_ai.py \
            e2e_imessage_connector.py \
            e2e_local_file_connectors.py \
            e2e_local_activity_connectors.py \
            e2e_portable_pim_imports.py \
            e2e_public_mcp_principal.py \
            e2e_remote_worker.py \
            e2e_workspace_rail.py \
            e2e_retrieval_eval.py
          do
            python "server/tests/$test"
          done
      - name: Immutable Recall Core container contract
        env:
          RECALL_CORE_IMAGE: recall-core:ci
        run: |
          docker build --pull --tag "$RECALL_CORE_IMAGE" --file Dockerfile .
          python server/tests/e2e_core_container.py
      - name: Recall Core image vulnerability gate
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: recall-core:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
      - name: Remote worker container contract
        env:
          RECALL_REMOTE_WORKER_IMAGE: recall-remote-worker:ci
        run: |
          docker build --pull --tag "$RECALL_REMOTE_WORKER_IMAGE" --file Dockerfile.remote-worker .
          python server/tests/e2e_remote_worker_container.py
      - name: Remote worker image vulnerability gate
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: recall-remote-worker:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
      - run: npm pack --dry-run
