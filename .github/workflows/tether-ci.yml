name: tether-ci

on:
  push:
    branches: ["main"]
    paths:
      - "tether/**"
      - "package.json"
      - "README.md"
      - ".agents/plugins/marketplace.json"
      - ".claude-plugin/marketplace.json"
      - "scripts/prove_portability.py"
      - "tests/test_portability.py"
      - ".github/workflows/tether-ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "tether/**"
      - "package.json"
      - "README.md"
      - ".agents/plugins/marketplace.json"
      - ".claude-plugin/marketplace.json"
      - "scripts/prove_portability.py"
      - "tests/test_portability.py"
      - ".github/workflows/tether-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: pip install bandit "ruff==0.15.18"
      - run: ruff check tether/runtime tether/skills/tether/scripts tether/tests
      - run: bandit -q -r tether/runtime tether/skills/tether/scripts -s B404
      - run: npm test
      - run: npm test
        working-directory: tether
      - run: npm pack --dry-run
        working-directory: tether
