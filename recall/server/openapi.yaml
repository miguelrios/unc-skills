openapi: 3.1.0
info:
  title: Recall BrainStore API
  version: 0.3.0-c4
  license:
    name: MIT
    identifier: MIT
servers:
  - url: http://127.0.0.1:8788
    description: C1 localhost-only development server
paths:
  /healthz:
    get:
      summary: Check process health
      operationId: getHealth
      security: []
      responses:
        '200': {description: Healthy}
        '503': {description: Unhealthy}
  /readyz:
    get:
      summary: Check database readiness
      operationId: getReadiness
      security: []
      responses:
        '200': {description: Ready}
        '503': {description: Not ready}
  /metrics:
    get:
      summary: Read content-free service metrics
      operationId: getMetrics
      security:
        - bearerAuth: []
      responses:
        '200': {description: Prometheus text metrics}
        '401': {description: Unauthorized}
  /v1/ingest/batches:
    post:
      summary: Commit an idempotent source-event batch
      operationId: ingestBatch
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema: {type: string, maxLength: 200}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [events]
              properties:
                events:
                  type: array
                  items: {$ref: '#/components/schemas/EnvelopeV1'}
      responses:
        '201': {description: Committed}
        '200': {description: Idempotent replay}
        '400': {description: Invalid envelope}
        '409': {description: Idempotency conflict}
        '413': {description: Body too large}
        '401': {description: Unauthorized}
        '403': {description: Collector source scope mismatch}
  /v1/receipts/resolve:
    get:
      summary: Resolve a sanitized evidence receipt
      operationId: resolveReceipt
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: receipt
          required: true
          schema: {type: string}
      responses:
        '200': {description: Sanitized event metadata and projected items}
        '404': {description: Receipt not found}
        '401': {description: Unauthorized}
  /v1/search:
    post:
      summary: Search authorized projected evidence with receipts and WHY legs
      operationId: searchRecall
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query: {type: string, minLength: 1}
                filters: {type: object}
                limit: {type: integer, minimum: 1, maximum: 20, default: 10}
      responses:
        '200': {description: Ranked receipt-bearing results or an abstention reason}
        '400': {description: Invalid query or filter}
        '401': {description: Unauthorized}
  /v1/show:
    post:
      summary: Read a bounded source-session window by path or receipt
      operationId: showRecall
      security:
        - bearerAuth: []
      responses:
        '200': {description: Ordered sanitized chunks with receipts}
        '404': {description: Source session not found}
        '401': {description: Unauthorized}
  /v1/related:
    post:
      summary: Find source sessions related by worktree and branch context
      operationId: relatedRecall
      security:
        - bearerAuth: []
      responses:
        '200': {description: Ranked related sessions with provenance}
        '401': {description: Unauthorized}
  /v1/doctor:
    get:
      summary: Read caller-safe central-brain health without source content
      operationId: doctorRecall
      security:
        - bearerAuth: []
      responses:
        '200': {description: Content-free source, projection, and freshness health}
        '401': {description: Unauthorized}
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Revocable collector token, or trusted Tailscale Serve identity at the proxy boundary.
  schemas:
    EnvelopeV1:
      type: object
      required: [schema_version, source_id, native_id, kind, occurred_at, observed_at,
        principal_id, visibility, content_type, content, content_sha256]
      properties:
        schema_version: {const: 1}
        source_id: {type: string}
        native_id: {type: string}
        native_parent_id: {type: string}
        kind: {type: string}
        occurred_at: {type: string, format: date-time}
        observed_at: {type: string, format: date-time}
        principal_id: {type: string}
        visibility: {enum: [private, shared]}
        content_type: {type: string}
        content: {}
        content_sha256: {type: string, pattern: '^[a-f0-9]{64}$'}
