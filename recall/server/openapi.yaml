openapi: 3.1.0
info:
  title: Recall BrainStore API
  version: 0.7.0-unified-control
  license:
    name: MIT
    identifier: MIT
servers:
  - url: http://127.0.0.1:8788
    description: C1 localhost-only development server
paths:
  /healthz:
    get:
      summary: Check process health
      operationId: getHealth
      security: []
      responses:
        '200': {description: Healthy}
        '503': {description: Unhealthy}
  /readyz:
    get:
      summary: Check database readiness
      operationId: getReadiness
      security: []
      responses:
        '200': {description: Ready}
        '503': {description: Not ready}
  /metrics:
    get:
      summary: Read content-free service metrics
      operationId: getMetrics
      security:
        - bearerAuth: []
      responses:
        '200': {description: Prometheus text metrics}
        '401': {description: Unauthorized}
  /v1/ingest/batches:
    post:
      summary: Commit an idempotent source-event batch
      operationId: ingestBatch
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema: {type: string, maxLength: 200}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [events]
              properties:
                events:
                  type: array
                  items: {$ref: '#/components/schemas/EnvelopeV1'}
      responses:
        '201': {description: Committed}
        '200': {description: Idempotent replay}
        '400': {description: Invalid envelope}
        '409': {description: Idempotency conflict}
        '413': {description: Body too large}
        '401': {description: Unauthorized}
        '403': {description: Collector source scope mismatch}
  /webhooks/v1/events:
    post:
      summary: Commit one typed source-scoped webhook event
      description: >
        The bearer credential owns source identity, principal identity, private
        visibility, provenance, and scrub/drop policy. The request cannot override
        those fields. Exact retries are idempotent; deletion is explicit only.
      operationId: ingestWebhookEvent
      security:
        - webhookBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookEventV1'
      responses:
        '201': {description: New canonical version committed}
        '200': {description: Exact idempotent replay}
        '202': {description: Event dropped by the credential privacy policy}
        '400': {description: Invalid closed or typed event}
        '401': {description: Missing, invalid, wrong-capability, or revoked credential}
        '409': {description: Idempotency conflict}
        '413': {description: Body too large}
        '415': {description: Unsupported content type}
  /v1/receipts/resolve:
    get:
      summary: Resolve a sanitized evidence receipt
      operationId: resolveReceipt
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: receipt
          required: true
          schema: {type: string}
      responses:
        '200': {description: Sanitized event metadata and projected items}
        '404': {description: Receipt not found or deleted by a later tombstone}
        '401': {description: Unauthorized}
  /v1/search:
    post:
      summary: Search authorized projected evidence with receipts and WHY legs
      operationId: searchRecall
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query: {type: string, minLength: 1}
                filters: {type: object}
                limit: {type: integer, minimum: 1, maximum: 20, default: 10}
      responses:
        '200': {description: Ranked receipt-bearing results or an abstention reason}
        '400': {description: Invalid query or filter}
        '401': {description: Unauthorized}
  /v1/show:
    post:
      summary: Read a bounded source-session window by path or receipt
      operationId: showRecall
      security:
        - bearerAuth: []
      responses:
        '200': {description: Ordered sanitized chunks with receipts}
        '404': {description: Source session not found}
        '401': {description: Unauthorized}
  /v1/session-export:
    post:
      summary: Page through one immutable sanitized session snapshot
      operationId: exportRecallSession
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                target: {type: string, description: Exact original path or canonical receipt}
                cursor: {type: string, description: Opaque cursor from the preceding page}
                limit: {type: integer, minimum: 1, maximum: 1000, default: 1000}
              oneOf:
                - required: [target]
                - required: [cursor]
      responses:
        '200': {description: Ordered redacted evidence page with snapshot and coverage receipts}
        '400': {description: Invalid target, cursor, or limit}
        '404': {description: Session/cursor not found or outside caller source scope}
        '401': {description: Unauthorized}
  /v1/related:
    post:
      summary: Find source sessions related by worktree and branch context
      operationId: relatedRecall
      security:
        - bearerAuth: []
      responses:
        '200': {description: Ranked related sessions with provenance}
        '401': {description: Unauthorized}
  /v1/doctor:
    get:
      summary: Read caller-safe central-brain health without source content
      operationId: doctorRecall
      security:
        - bearerAuth: []
      responses:
        '200': {description: Content-free source, projection, and freshness health}
        '401': {description: Unauthorized}
  /admin/api/v1/session:
    post:
      summary: Exchange an audience-bound admin key for a browser session
      operationId: exchangeAdminSession
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [token]
              properties:
                token: {type: string, writeOnly: true, minLength: 36, maxLength: 132}
      responses:
        '201': {description: Secure session and CSRF cookies set}
        '400': {description: Invalid closed request}
        '401': {description: Invalid, expired, or revoked admin key}
  /admin/api/v1/state:
    get:
      summary: Read the caller's brain, connector, connection, and route state
      operationId: getConnectorControlState
      security:
        - adminSession: []
      responses:
        '200': {description: Content-free connector control state}
        '401': {description: Invalid, expired, or revoked session}
  /admin/api/v1/oauth/start:
    post:
      summary: Start a one-time provider authorization for explicit brain routes
      operationId: startConnectorOAuth
      security:
        - adminSession: []
      parameters:
        - $ref: '#/components/parameters/AdminCsrf'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [provider, routes]
              properties:
                provider: {const: google}
                routes:
                  type: array
                  minItems: 1
                  maxItems: 8
                  items: {$ref: '#/components/schemas/ConnectorRouteV1'}
      responses:
        '201': {description: HTTPS authorization URL with server-owned state and PKCE}
        '400': {description: Invalid provider, route, selector, or privacy policy}
        '403': {description: CSRF failure or destination brain is not administrable}
  /admin/oauth/callback/google:
    get:
      summary: Complete one Google authorization-code flow
      operationId: completeGoogleOAuth
      security: []
      parameters:
        - {in: query, name: state, required: true, schema: {type: string}}
        - {in: query, name: code, required: true, schema: {type: string}}
      responses:
        '303': {description: Connected; redirect to the switchboard}
        '400': {description: Invalid callback}
        '403': {description: Expired, consumed, or insufficient-scope grant}
        '502': {description: Provider exchange failed closed}
  /admin/api/v1/installations/{installation_id}/actions:
    post:
      summary: Enable, pause, resume, revoke, or uninstall one routed source
      operationId: transitionConnectorInstallation
      security:
        - adminSession: []
      parameters:
        - $ref: '#/components/parameters/AdminCsrf'
        - in: path
          name: installation_id
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [action]
              properties:
                action: {enum: [enable, pause, resume, revoke, uninstall]}
      responses:
        '200': {description: Idempotent lifecycle result}
        '403': {description: CSRF failure}
        '404': {description: Installation absent or belongs to another principal}
        '409': {description: Invalid lifecycle transition}
  /admin/api/v1/connections/{connection_id}/revoke:
    post:
      summary: Revoke one provider grant and every dependent installation
      operationId: revokeProviderConnection
      security:
        - adminSession: []
      parameters:
        - $ref: '#/components/parameters/AdminCsrf'
        - in: path
          name: connection_id
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema: {type: object, additionalProperties: false}
      responses:
        '200': {description: Provider authority revoked and encrypted secret wiped}
        '403': {description: CSRF failure}
        '404': {description: Connection absent or belongs to another principal}
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Revocable collector token, or trusted Tailscale Serve identity at the proxy boundary.
    webhookBearer:
      type: http
      scheme: bearer
      description: Revocable webhook-only token bound to one source, principal, and privacy mode.
    adminSession:
      type: apiKey
      in: cookie
      name: recall_admin_session
      description: Short-lived Secure, HttpOnly, SameSite browser session.
  parameters:
    AdminCsrf:
      in: header
      name: X-Recall-CSRF
      required: true
      schema: {type: string, minLength: 32, maxLength: 256}
      description: Must equal the Strict CSRF cookie and the server-side session digest.
  schemas:
    ConnectorRouteV1:
      type: object
      additionalProperties: false
      required: [connector_id, tenant_id, privacy_mode, selectors]
      properties:
        connector_id: {type: string, minLength: 3, maxLength: 128}
        tenant_id: {type: string, minLength: 2, maxLength: 256}
        privacy_mode: {enum: [scrub, drop]}
        selectors:
          type: object
          description: Closed against the selected connector's registry fields.
    WebhookEventV1:
      type: object
      additionalProperties: false
      required: [schema_version, event_id, occurred_at, record, deleted]
      properties:
        schema_version: {const: 1}
        event_id: {type: string, minLength: 1, maxLength: 512}
        parent_id: {type: string, minLength: 1, maxLength: 512}
        occurred_at: {type: string, format: date-time}
        record:
          type: object
          description: A closed typed record from contracts/connector_v2.json.
        deleted:
          type: boolean
          description: True only for an explicit upstream tombstone.
    EnvelopeV1:
      type: object
      required: [schema_version, source_id, native_id, kind, occurred_at, observed_at,
        principal_id, visibility, content_type, content, content_sha256]
      properties:
        schema_version: {const: 1}
        source_id: {type: string}
        native_id: {type: string}
        native_parent_id: {type: string}
        kind: {type: string}
        occurred_at: {type: string, format: date-time}
        observed_at: {type: string, format: date-time}
        principal_id: {type: string}
        visibility: {enum: [private, shared]}
        content_type: {type: string}
        content: {}
        content_sha256: {type: string, pattern: '^[a-f0-9]{64}$'}
