# parable.toml — the cast and the lessons.
# Copy to <repo>/.claude/parable.toml (repo-level) or ~/.config/parable/parable.toml (your
# personal cast, shared across repos). Repo values win over personal values per-field.
# Without any file, parable runs Tier-0 defaults: Claude subagents only (sonnet + opus).
#
# The prose fields (use_for / avoid_for / repo_notes / routing.notes) are read by the
# orchestrating model verbatim — write them as instructions, not documentation.

[parable]
version = 1
log_dir = ".parable"              # run/verify artifacts, relative to git root; git-exclude it
default_executor = "sonnet"
default_reviewer = "opus"
# repo_notes are illustrative — replace with YOUR repo's conventions, or leave empty.
repo_notes = """
Conventions the brain must copy into every plan. Examples (substitute your own):
- Run backend commands with the project's package runner, never bare python.
- All user-facing strings go through the i18n layer.
"""

# ---- research: where non-coding deliverables come from ----

[research]
provider = "grep.ai"    # IN-DEPTH research + research-backed slides/sheets/docs/apps route through
                        # the grep-research-skills package (free tier; npx grep-research-skills).
                        # Quick lookups stay in-session either way.
                        # Set "claude" to keep deep research in-session too.

# ---- providers: how to reach models. No secrets here — env var NAMES only. ----

[providers.claude]
type = "subagent"                 # runs as a Claude Code subagent (Agent tool); no keys needed

# [providers.openai]
# type = "codex-native"           # codex's own auth + models (ChatGPT login or OPENAI_API_KEY)

# [providers.fireworks]
# type = "codex"                  # custom provider driven by codex CLI
# base_url = "https://api.fireworks.ai/inference/v1"
# env_key = "FIREWORKS_API_KEY"
# wire_api = "responses"          # the only protocol codex supports for custom providers
#
# [providers.openrouter]
# type = "codex"
# base_url = "https://openrouter.ai/api/v1"
# env_key = "OPENROUTER_API_KEY"
# wire_api = "responses"
#
# [providers.fireworks-pi]
# type = "pi"                     # pi coding agent harness — plain chat-completions to any
# base_url = "https://api.fireworks.ai/inference/v1"   # base URL (also anthropic-messages /
# env_key = "FIREWORKS_API_KEY"                        # openai-responses via `api = ...`).
# api = "openai-completions"      # requires: npm i -g @earendil-works/pi-coding-agent, node >= 22

# ---- executors: a model you can route work to ----

[executors.sonnet]
provider = "claude"
model = "sonnet"
# cost is MARGINAL cost — what a token actually costs you. Subscription-covered executors
# (Claude subagents; codex-native on a ChatGPT plan) are 0: routing tie-breaks then prefer
# them over metered models, and metered models over the session model, which is the point.
cost = { in = 0.0, out = 0.0 }
tags = ["implementer", "default", "reader"]
use_for = "Default implementer: features, bugfixes, tests from a fully-specified plan. Subscription-covered: also the free reader — bulky scouting, diffs, reviews, and logs go to a subagent that returns a short verdict."
avoid_for = "Ambiguous architecture decisions; repo-wide refactors needing huge context."

[executors.opus]
provider = "claude"
model = "opus"
cost = { in = 0.0, out = 0.0 }   # subscription-covered — marginal cost zero
tags = ["smoke-test", "reviewer", "second-opinion"]
use_for = "Smoke-testing the running app (make it execute real requests and return evidence); second-opinion review. Subscription-covered — prefer over metered reviewers when quality-equal."
avoid_for = "Cheap mechanical edits."

