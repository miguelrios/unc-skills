# ---- checks: named deterministic verification commands ----
# {targets} is substituted from `parable-verify.sh --targets "..."` (empty by default).
# The commands below are examples from one stack — substitute your own
# ("go test ./...", "bundle exec rspec", "cargo clippy", "npm test", …).

# [checks.typecheck]
# cwd = "frontend"                # relative to git root
# run = "npm run typecheck"
# when = ["post-implement", "pre-commit"]
# timeout_minutes = 10
# grep = "error TS\\d+"           # optional: regex extracting the actionable lines on failure
# tail_lines = 8                  # fallback failure-tail length

# [checks.tests]
# cwd = "backend"
# run = "uv run pytest -q ${targets:-test/unit}"
# when = ["post-implement", "pre-commit"]
# timeout_minutes = 20
# When the full suite needs services the working copy lacks (a live DB, queues), give
# {targets} a hermetic default as above — otherwise an unscoped post-implement check fails
# on environmental grounds and masks real regressions.
# Keep the test check on BOTH gates: a post-implement-only test check goes stale the moment
# review fix-ups land, and the pre-commit gate then passes on typecheck alone.

# ---- routing: task class -> ordered executor preference ----
# Selection algorithm: references/routing.md.

[routing]
mechanical    = ["sonnet"]
feature       = ["sonnet"]
refactor_wide = ["sonnet"]
gnarly        = ["opus"]
review        = ["opus"]
smoke_test    = ["opus"]
escalation    = ["sonnet", "opus"]   # generic cheap -> mid -> frontier ladder
notes = """
Prefer the cheapest tagged-capable executor. Escalate only after a tightened plan failed
on the current tier. The reviewer must never share a model with the author.
"""
